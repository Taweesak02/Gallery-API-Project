/v1/auth/login:
  post:
    tags: [Authentication]
    summary: Login User
    description: Login user
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoginRequest'
    responses:
      200:
        description: Success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginSuccessResponse'
      400:
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginMissingInputResponse'
      401:
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInvalidAuthenticationResponse'
      500:
        description: Error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginErrorResponse'

/v1/auth/register:
  post:
    tags: [Authentication]
    summary: Register User
    description: Register user
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegisterRequest'
    responses:
      201:
        description: Success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterSuccessResponse'
      400:
        description: Bad Request
        content:
          application/json:
            $ref: '#/components/schemas/RegisterInvalidInputResponse'
      409:
        description: Conflict
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDuplicateResponse'
      500:
        description: Error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterErrorResponse'

/v1/auth/refresh:
  post:
    tags: [Authentication]
    summary: Refresh 
    description: get new access token
    security: []
    responses:
      200:
        description:  Success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshSuccessResponse'
      400:
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshNoTokenResponse'           
      401:
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshUnvalidTokenResponse'
      500:
        description: Error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshErrorResponse'

/v1/auth/logout:
  post:
    tags: [Authentication]
    summary: Logout User
    description: Logout User deactive lastest refresh token
    responses:
      200:
        description: Success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutSuccessResponse'
      400:
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutNoTokenResponse'           
      401:
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutUnvalidTokenResponse'
      500:
        description: Error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutErrorResponse'

/v1/auth/delete:
  delete:
    tags: [Authentication]
    summary: Delete user
    description: Delete user from database
    responses:
      200:
        description: Success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteSuccessResponse'
      400:
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteNoTokenResponse'           
      401:
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteUnvalidTokenResponse'
      500:
        description: Error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteErrorResponse'
    
/v1/auth/delete/{userId}:
  delete:
    tags: [Authentication]
    summary: Delete user by Id
    description: Delete user by Id from database admin only
    parameters:
      - name: userId
        in: path
        required: true
        description: The numeric ID of the user to retrieve.
        schema:
          type: integer
    responses:
      200:
        description: Success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteByIdSuccessResponse'
      400:
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteByIdNoTokenResponse'           
      401:
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteByIdUnvalidTokenResponse'
      403:
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteByIdUnvalidTokenResponse'
      404:
        description:  Not Found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteByIdNotFoundResponse'
      500:
        description: Error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteByIdErrorResponse'
    
