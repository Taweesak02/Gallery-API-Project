components:
  schemas:
    AddArtworkRequest:
      type: object
      required: [image]
      properties:
        title:
          type: string
          example: title
        image:
            type: string
            format: binary
    
    EditArtworkRequest:
      type: object
      required: []
      properties:
        title:
          type: string
          example: title
        image:
            type: string
            format: binary