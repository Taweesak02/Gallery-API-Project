    GalleryGetErrorResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - example:
            status: 500
            path: v1/gallery/
            message: Error message

    GalleryGetByIdErrorResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - example:
