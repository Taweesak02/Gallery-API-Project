/v1/artist/:
  get:
    tags: [Artist]
    summary: Get Artist
    security: []
    description: Get Artist Data By query from Database
    parameters:
      - name: userId
        in: query
        description: UserId of Artist
        schema:
          type: integer
          default: 1
      - name: name
        in: query
        description: Artist name
        schema:
          type: string
          default: artist name
      - name: sex
        in: query
        description: Artist sex
        schema:
          type: string
          default: male
      - name: sex
        in: query
        description: Artist sex
        schema:
          type: string
          default: male
      - name: birthdate
        in: query
        description: Artist birthdate
        schema:
          type: date
          default: 2026-07-06T04:18:07.963Z
      - name: nationality
        in: query
        description: Artist nationality
        schema:
          type: string
          default: thai
    responses:
      200:
        description: Success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtistGetSuccessResponse'

      500:
        description: Error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtistGetErrorResponse'

/v1/artist/{artistId}:
  get:
    tags: [Artist]
    summary: Get Artist By Id
    description: Get Artist Data By Id
    security: []
    parameters:
      - name: artistId
        in: path
        required: true
        description: Search artist data by artistId
        schema:
          type: integer
    responses:
      200:
        description: Success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtistGetByIdSuccessResponse'
      404:
        description: Not Found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtistGetByIdNotFoundResponse'
      500:
        description: Error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtistGetByIdErrorResponse'

/v1/artist/register:
  post:
    tags: [Artist]
    summary: Register Artist
    description: Register new artist to Database
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/ArtistRegisterRequest'
    responses:
      201:
        description: Success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtistRegisterSuccessResponse'
      400:
        description: Bad Request
        content:
          application/json:
            $ref: '#/components/schemas/ArtistRegisterInvalidInputResponse'
      401:
        description: Unauthorized
        content:
          application/json:
            $ref: '#/components/schemas/ArtistRegisterInvalidAuthenticationResponse'
      409:
        description: Conflict
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtistRegisterDuplicateResponse'
      500:
        description: Error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtistRegisterErrorResponse'

