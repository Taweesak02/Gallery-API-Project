components:
  responses:
    messageResponses:
      loginMessages:
        success:
          type: string
          example: Login success
        failed:
          type: string
          example: Login failed
      registerMessages:
        success:
          type: string
          example: Register success
        failed:
          default: Register failed
      refreshMessages:
        success:
          type: string
          example: Refresh success
        failed:
          type: string
          example: Refresh failed
      logoutMessages:
        success:
          type: string
          example: Logout success
        failed:
          type: string
          example: Logout failed
      deleteMessages:
        success:
          type: string
          example: Delete success
        failed:
          type: string
          example: Delete failed
      getmeMessages:
        success:
          type: string
          example: Getme success
        failed:
          type: string
          example: Getme failed
      updateMessages:
        success:
          type: string
          example: Update success
        failed:
          type: string
          example: Update failed

    dataResponses:
      userDataWithAccessToken:
        type: object
        properties:
          id:
            type: integer
            example: 1
          username:
            type: string
            example: user
          email:
            type: string
            example: user@gmail.com
          role:
            type: string
            example: user
          accessToken:
            type: string
            example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      userDatawithDate:
        type: object
        properties:
          id:
            type: integer
            example: 1
          username:
            type: string
            example: user
          email:
            type: string
            example: user@gmail.com
          role:
            type: string
            example: user
          createAt:
            type: string
            example: 2026-06-21
          updateAt:
            type: string
            example: 2026-06-21

      