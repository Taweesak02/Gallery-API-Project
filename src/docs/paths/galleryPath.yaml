/v1/gallery/:
  get:
    tags: [Gallery]
    summary: Get Artwork
    description: Get Artwork from Database
    security: []
    parameters:
      - name: title
        in: query
        description: Artwork title
        schema:
          type: string
          default: artwork
      - name: artist_id
        in: query
        description: Artwork create by artist_id
        schema:
          type: integer
          default: 1
      - name: create_date
        in: query
        description: Artwork create by create_date
        schema:
          type: date
          default: "2026-06-21"
    responses:
      200:
        description: Get artwork success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/getArtworkResponses/success'
      500:
        description: Get artwork failed
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/getArtworkResponses/failed_500'

/v1/gallery/{artworkId}:
  get:
    tags: [Gallery]
    summary: Get Artwork By Id
    description: Get Artwork By Id from Database
    security: []
    parameters:
      - name: artworkId
        in: path
        required: true
        description: The numeric ID of the user to retrieve.
        schema:
          type: integer
    responses:
      200:
        description: Get Artwork success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/getArtworkResponses/success'
      500:
        description: Get Artwork failed
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/getArtworkResponses/failed_500'

/v1/gallery/add:
  post:
    tags: [Gallery]
    summary: Add Artwork
    description: Add Artwork to Database
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/addArtworkRequest'
    responses:
      201:
        description: Add artwork success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/addArtworkResponses/success'
      400:
        description: Image file is require
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/addArtworkResponses/failed_400'
      401:
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tokenCheckResponses/schema'
            examples:
              noAccessToken:
                $ref: '#/components/schemas/tokenCheckResponses/noToken'
              invalidAccessToken:
                $ref: '#/components/schemas/tokenCheckResponses/accessTokenUnvalid'
      404:
        description: Artist not found
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/addArtworkResponses/failed_404'
      500:
        description: Add artwork failed
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/addArtworkResponses/failed_500'

/v1/gallery/edit/{artworkId}:
  patch:
    tags: [Gallery]
    summary: Edit Artwork
    description: Edit Artwork to Database
    parameters:
      - name: artworkId
        in: path
        required: true
        description: Edit artwork data from artwork id
        schema:
          type: integer
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/editArtworkRequest'
    responses:
      200:
        description: Edit artwork success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/editArtworkResponses/success'
      400:
        description: No data to edit
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/editArtworkResponses/failed_400'
      401:
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tokenCheckResponses/schema'
            examples:
              noAccessToken:
                $ref: '#/components/schemas/tokenCheckResponses/noToken'
              invalidAccessToken:
                $ref: '#/components/schemas/tokenCheckResponses/accessTokenUnvalid'
      500:
        description: Edit artwork failed
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/editArtworkResponses/failed_500'

/v1/gallery/remove/{artworkId}:
  delete:
    tags: [Gallery]
    summary: Remove Artwork
    description: Edit Artwork to Database
    parameters:
      - name: artworkId
        in: path
        required: true
        description: Delete artwork using artwork id
        schema:
          type: integer
    responses:
      200:
        description: Remove success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/removeArtworkResponses/success'
      401:
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tokenCheckResponses/schema'
            examples:
              noAccessToken:
                $ref: '#/components/schemas/tokenCheckResponses/noToken'
              invalidAccessToken:
                $ref: '#/components/schemas/tokenCheckResponses/accessTokenUnvalid'
      500:
        description: Remove failed
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/removeArtworkResponses/failed_500'
