/v1/gallery/:
  get:
    tags: [Gallery]
    summary: Get Artwork
    description: Get Artwork from Database
    security: []
    parameters:
      - name: title
        in: query
        description: Artwork title
        schema:
          type: string
          default: artwork
      - name: artist_id
        in: query
        description: Artwork create by artist_id
        schema:
          type: integer
          default: 1
      - name: create_date
        in: query
        description: Artwork create by create_date
        schema:
          type: date
          default: "2026-06-21"
    responses:
      200:
        description: Get Artwork success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetArtworkResponse/success'
      401:
        description: Get Artwork failed
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/GetArtworkResponse/failed_401'
      500:
        description: Get Artwork failed
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/GetArtworkResponse/failed_500'

/v1/gallery/{id}:
  get:
    tags: [Gallery]
    summary: Get Artwork By Id
    description: Get Artwork By Id from Database
    security: []
    parameters:
      - name: userId
        in: path
        required: true
        description: The numeric ID of the user to retrieve.
        schema:
          type: integer
    responses:
      200:
        description: Get Artwork success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetArtworkResponse/success'
      401:
        description: Get Artwork failed
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/GetArtworkResponse/failed_401'
      500:
        description: Get Artwork failed
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/GetArtworkResponse/failed_500'

/v1/gallery/add:
  post:
    tags: [Gallery]
    summary: Add Artwork
    description: Add Artwork to Database
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/AddArtworkRequest'
    responses:
      200:
        description: Patch success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddArtworkResponse/success'
      500:
        description: Patch failed
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/AddArtworkResponse/failed_500'

/v1/gallery/edit/{id}:
  patch:
    tags: [Gallery]
    summary: Edit Artwork
    description: Edit Artwork to Database
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/AddArtworkRequest'
    responses:
      200:
        description: Patch success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditArtworkResponse/success'
      500:
        description: Patch failed
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/EditArtworkResponse/failed_500'

/v1/gallery/remove/{id}:
  delete:
    tags: [Gallery]
    summary: Remove Artwork
    description: Edit Artwork to Database
    responses:
      200:
        description: Remove success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveArtworkResponse/success'
      500:
        description: Remove failed
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/RemoveArtworkResponse/failed_500'
