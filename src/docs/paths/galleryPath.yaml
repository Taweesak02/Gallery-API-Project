/v1/gallery/:
  get:
    tags: [Gallery]
    summary: Get Artwork
    description: Get Artwork from Database
    security: []
    parameters:
      - name: title
        in: query
        description: Artwork title
        schema:
          type: string
          default: artwork
      - name: artist_id
        in: query
        description: Artwork create by artist_id
        schema:
          type: integer
          default: 1
      - name: create_at
        in: query
        description: Artwork date created
        schema:
          type: date
          default: 2026-07-06T04:18:07.963Z
    responses:
      200:
        description: Success
        content:
          application/json:
            $ref: '#/components/schemas/GalleryGetSuccessResponse'
      500:
        description: Error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GalleryGetErrorResponse'

/v1/gallery/{artworkId}:
  get:
    tags: [Gallery]
    summary: Get Artwork By Id
    description: Get Artwork By Id from Database
    security: []
    parameters:
      - name: artworkId
        in: path
        required: true
        description: The numeric ID of the user to retrieve.
        schema:
          type: integer
    responses:
      200:
        description: Success
        content:
          application/json:
            $ref: '#/components/schemas/GalleryGetByIdSuccessResponse'
      500:
        description: Error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GalleryGetByIdErrorResponse'

/v1/gallery/add:
  post:
    tags: [Gallery]
    summary: Add Artwork
    description: Add Artwork to Database
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/AddArtworkRequest'
    responses:
      201:
        description: Success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GalleryAddSuccessResponse'
      400:
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GalleryAddNoTokenResponse'
      401:
        description: Unauthorized
        content:
          application/json:
            $ref: '#/components/schemas/GalleryAddUnvalidTokenResponse'
      404:
        description: Not Found
        content:
          application/json:
            $ref: '#/components/schemas/GalleryAddNotFoundResponse'
      500:
        description: Error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GalleryAddErrorResponse'

/v1/gallery/edit/{artworkId}:
  patch:
    tags: [Gallery]
    summary: Edit Artwork
    description: Edit Artwork to Database
    parameters:
      - name: artworkId
        in: path
        required: true
        description: Edit artwork data from artwork id
        schema:
          type: integer
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/EditArtworkRequest'
    responses:
      200:
        description: Success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GalleryEditSuccessResponse'
      400:
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GalleryEditNoTokenResponse'
      401:
        description: Unauthorized
        content:
          application/json:
            $ref: '#/components/schemas/GalleryEditUnvalidTokenResponse'
      404:
        description: Not Found
        content:
          application/json:
            $ref: '#/components/schemas/GalleryEditNotFoundResponse'
      403:
        description: Forbidden
        content:
          application/json:
            $ref: '#/components/schemas/GalleryEditForbiddenResponse'
      500:
        description: Error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GalleryEditErrorResponse'

/v1/gallery/remove/{artworkId}:
  delete:
    tags: [Gallery]
    summary: Remove Artwork
    description: Edit Artwork to Database
    parameters:
      - name: artworkId
        in: path
        required: true
        description: Delete artwork using artwork id
        schema:
          type: integer
    responses:
      200:
        description: Success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GalleryDeleteSuccessResponse'
      400:
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GalleryDeleteNoTokenResponse'
      401:
        description: Unauthorized
        content:
          application/json:
            $ref: '#/components/schemas/GalleryDeleteUnvalidTokenResponse'
      404:
        description: Not Found
        content:
          application/json:
            $ref: '#/components/schemas/GalleryDeleteNotFoundResponse'
      403:
        description: Forbidden
        content:
          application/json:
            $ref: '#/components/schemas/GalleryDeleteForbiddenResponse'
      500:
        description: Error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GalleryDeleteErrorResponse'