components:
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          example: user@gmail.com
        password:
          type: string
          example: "123456"
    LoginResponse:
      success:
        type: object
        properties:
          message:
            type: string
            example: Login success
          data:
            $ref: '#/components/responses/DataResponse'
      failed_401:
        type: object
        properties:
          message:
            type: string
            example: Login failed
          error:
            type: string
            example: Invalid email or password
      failed_500:
        type: object
        properties:
          message:
            type: string
            example: Login failed
          error:
            type: string
            example: Error message

    RegisterRequest:
      type: object
      required: [username, email, password, confirmPassword]
      properties:
        username:
          type: string
          example: username
        email:
          type: string
          example: user@gmail.com
        password:
          type: string
          example: "123456"
        confirmPassword:
          type: string
          example: "123456"
    RegisterResponse:
      success:
          type: object
          properties:
            message:
              type: string
              example: Register success
            data:
              $ref: '#/components/responses/DataResponse'
      failed_409:
