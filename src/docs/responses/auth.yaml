components:
  responses:
    DataResponse:
      type: object
      properties:
        id:
          type: string
          example: 1
        username:
          type: string
          example: user
        email:
          type: string
          example: user@gmail.com
        role:
          type: string
          example: user
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    ArtistDataResponse:
      type: object
      properties:
        id:
          type: string
          example: 1
        user_id:
          type: string
          example: 1
        name:
          type: string
          example: name
        sex:
          type: string
          example: male
        birth_date:
          type: string
          example: birth_date
        nationality:
          type: string
          example: thai
        profile_image:
          type: string
          example: image_url
        created_at:
          type: string
          example: created_at_date
        updated_at:
          type: string
          example: updated_at_date

    ArtworkDataResponse:
      type: object
      properties:
        id:
          type: string
          example: 1

  