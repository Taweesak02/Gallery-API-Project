components:
  schemas:
    loginResponses:
      success:
        type: object
        properties:
          message:
            $ref: '#/components/responses/messageResponses/loginMessages/success'
          data:
            $ref: '#/components/responses/dataResponses/userDataWithAccessToken'
      failed_400:
        type: object
        properties:
          message:
            $ref: '#/components/responses/messageResponses/loginMessages/failed'
          error:
            type: string
            example: Missing fields input ...
      failed_401:
        type: object
        properties:
          message:
             $ref: '#/components/responses/messageResponses/loginMessages/failed'
          error:
            type: string
            example: Invalid email or password
      failed_500:
        type: object
        properties:
          message:
            $ref: '#/components/responses/messageResponses/loginMessages/failed'
          error:
            $ref: '#/components/responses/errorResponses/500'
    
