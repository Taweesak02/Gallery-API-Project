            status: 401
            path: v1/auth/delete/{userId}
            message: Token is unvalid
    
    GetmeUnvalidTokenResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - example:
            status: 401
            path: v1/auth/getme
            message: Token is unvalid

    UpdateUnvalidTokenResponse:
