        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateByIdUnvalidTokenResponse'
      403:
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateByIdForbiddenResponse'
      404:
        description: Not Found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateByIdNotFoundResponse'
      
      409:
        description: Conflict
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateByIdDuplicateResponse'
      500:
        description: Error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateByIdErrorResponse'