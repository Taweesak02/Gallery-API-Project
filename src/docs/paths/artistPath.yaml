/v1/artist/register:
  post:
    tags: [Artist]
    summary: Register Artist
    description: Register new artist to Database
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/registerArtistRequest'
    responses:
      201:
        description: Register success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/registerArtistResponses/success'
      401:
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tokenCheckResponses/schema'
            examples:
              noAccessToken:
                $ref: '#/components/schemas/tokenCheckResponses/noToken'
              invalidAccessToken:
                $ref: '#/components/schemas/tokenCheckResponses/accessTokenUnvalid'
      409:
        description: User already have artist account
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/registerArtistResponses/failed_409'

      500:
        description: Register failed
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/registerArtistResponses/failed_500'

