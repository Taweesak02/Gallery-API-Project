components:
  schemas:
    LoginInvalidAuthenticationResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - example:
            status: 401
            path: v1/auth/login
            message: Invalid email or password
    
    RefreshUnvalidTokenResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - example:
            status: 401
            path: v1/auth/refresh
            message: Token is unvalid
    
    LogoutUnvalidTokenResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
