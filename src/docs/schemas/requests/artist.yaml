components:
  schemas:
    ArtistRegisterRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: pencil
        sex:
          type: string
          example: male
        birth_date:
          type: string
          example: male
        nationality:
          type: string
          example: 1:1:2000
        image:
          type: string
          format: binary

    ArtistUpdateRequest:
      type: object
      required: []
      properties:
        name:
          type: string
          example: name
        sex:
          type: string
          example: male
        birth_date:
          type: string
          example: birth_date
        nationality:
          type: string
          example: thai
        image:
            type: string
            format: binary

