/v1/auth/login:
  post:
    tags: [Authentication]
    summary: Login User
    description: Login user from Database
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/loginRequest'
    responses:
      200:
        description: Login success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/loginResponses/success'
      400:
        description: Missing field input
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/loginResponses/failed_400'
      401:
        description: Invalid email or password
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/loginResponses/failed_401'
      500:
        description: Login failed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/loginResponses/failed_500'

/v1/auth/register:
  post:
    tags: [Authentication]
    summary: Register User
    description: Register new user to Database
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/registerRequest'
    responses:
      201:
        description: Register success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/registerResponses/success'
      400:
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/registerResponses/failed_400'
            examples:
              missingInput:
                value:
                 
                  message: Register failed
                  error: Missing fields input ...
              passwordNotMatching:
                value:
                  message: Register failed
                  error: Password and confirmPassword do not matching
     
      409:
        description: User already exist
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/registerResponses/failed_409'
      500:
        description: Register failed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/registerResponses/failed_500'

/v1/auth/refresh:
  post:
    tags: [Authentication]
    summary: Refresh 
    description: get new access token
    security: []
    responses:
      200:
        description: Refresh success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/refreshResponses/success'
      401:
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tokenCheckResponses/schema'
            examples:
              noRefreshToken:
                $ref: '#/components/schemas/tokenCheckResponses/noToken'
              invalidRefreshToken:
                $ref: '#/components/schemas/tokenCheckResponses/refreshTokenUnvalid'
      500:
        description: Refresh failed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/refreshResponses/failed_500'

/v1/auth/logout:
  post:
    tags: [Authentication]
    summary: Logout User
    description: Logout User deactive lastest refresh token
    responses:
      200:
        description: Logout success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/logoutResponses/success'
      401:
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tokenCheckResponses/schema'
            examples:
              noAccessToken:
                $ref: '#/components/schemas/tokenCheckResponses/noToken'
              invalidAccessToken:
                $ref: '#/components/schemas/tokenCheckResponses/accessTokenUnvalid'
      500:
        description: Logout failed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/logoutResponses/failed_500'

/v1/auth/delete:
