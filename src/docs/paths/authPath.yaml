    tags: [Authentication]
    summary: Update user
    description: Update own user data
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateRequest'
    responses:
      200:
        description: Success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSuccessResponse'
