              $ref: '#/components/schemas/LogoutResponse/success'
      401:
        description: Logout failed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutResponse/failed_401'        
      500:
        description: Logout failed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutResponse/failed_500'

