components:
  schemas:
    LoginSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - example:
            status: 200
            path: v1/auth/login
            responses:
              id: 1
              role: user
              accessToken: eyJhbGciOiJIUzI1NiIsInR5cC...
        
    RegisterSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - example:
            status: 201
            path: v1/auth/register
            responses:
              id: 1
              role: user
              accessToken: eyJhbGciOiJIUzI1NiIsInR5cC...

    RefreshSuccessResponse:
      allOf:
