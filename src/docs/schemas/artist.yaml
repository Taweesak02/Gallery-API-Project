components:
  schemas:
    RegisterArtistRequest:
      type: object
      required: []
      properties:
        name:
          type: string
          example: name
        image:
            type: string
            format: binary
    RegisterArtistResponse:
      success:
        type: object
        properties:
          message:
            type: string
            example: Register success
          data:
            $ref: '#/components/responses/ArtistDataResponse'
      failed_401:
        type: object
        properties:
          message:
            type: string
            example: Register failed
          error:
            type: string
            example: no token provide
      failed_500:
        type: object
        properties:
          message:
            type: string
            example: Register failed
          error:
            type: string
            example: Error message

    DeleteArtistResponse:
      success:
        type: object
        properties:
          message:
            type: string
            example: Delete success
          data:
            $ref: '#/components/responses/ArtistDataResponse'
      failed_401:
        type: object
        properties:
          message:
            type: string
            example: Delete failed
          error:
            type: string
            example: no token provide
      failed_500:
        type: object
        properties:
          message:
            type: string
            example: Delete failed
          error:
            type: string
            example: Error message

    PatchArtistRequest:
      type: object
      required: []
      properties:
        name:
          type: string
          example: name
        sex:
          type: string
          example: male
        birth_date:
          type: string
          example: birth_date
        nationality:
          type: string
          example: thai
        image:
            type: string
            format: binary
    PatchArtistResponse:
      success:
        type: object
        properties:
          message:
            type: string
            example: Patch success
          data:
            $ref: '#/components/responses/ArtistDataResponse'
      failed_401:
        type: object
        properties:
          message:
            type: string
            example: Patch failed
          error:
            type: string
            example: Error message
      failed_500:
        type: object
        properties:
          message:
            type: string
            example: Patch failed
          error:
            type: string
            example: Error message


