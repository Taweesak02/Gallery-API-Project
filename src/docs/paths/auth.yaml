/v1/auth/update:
  patch:
    tags: [Authentication]
    summary: Update user
    description: Update own user data
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateRequest'
    responses:
      200:
        description: Update success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResponse/success'
      401:
        description: Update failed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResponse/failed_401'
      500:
        description: Update failed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResponse/failed_500'

/v1/auth/update/{userId}:
  patch:
    tags: [Authentication]
    summary: Update user by Id
    description: Update other user data
    parameters:
      - name: userId
        in: path
        required: true
        description: The numeric ID of the user to retrieve.
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateRequest'
    responses:
      200:
        description: Update success
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResponse/success'
      401:
        description: Update failed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResponse/failed_401'
      500:
        description: Update failed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResponse/failed_500'
